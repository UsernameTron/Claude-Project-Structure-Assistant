# Mobile App Template
# For React Native, Flutter, Expo, and native mobile projects

name: mobile-app
display_name: "Mobile / Cross-Platform App"
description: "Mobile application with screens, navigation, and optional backend integration"

trigger_conditions:
  - "mobile app"
  - "React Native"
  - "Flutter"
  - "Expo"
  - "iOS app"
  - "Android app"
  - "cross-platform"

file_signals:
  extensions: [".tsx", ".jsx", ".dart", ".swift", ".kt"]
  directories: ["/ios", "/android", "/app", "/screens", "/navigation"]
  packages: ["react-native", "expo", "flutter", "@react-navigation"]

agents:
  - name: ui-builder
    description: "Creates screens, components, and navigation flows"
    model: sonnet
    tools: Read, Write, Edit, Bash, Glob, Grep
    memory: project
    maxTurns: 25
    skills_if_available: [frontend-design]
    routing_triggers:
      - "screen"
      - "component"
      - "navigation"
      - "UI"
      - "layout"
      - "style"

  - name: logic-handler
    description: "Handles state management, API calls, and business logic"
    model: sonnet
    tools: Read, Write, Edit, Bash, Glob, Grep
    memory: project
    maxTurns: 25
    routing_triggers:
      - "state"
      - "API call"
      - "business logic"
      - "data flow"
      - "authentication"

  - name: platform-specialist
    description: "Manages platform-specific configuration and native modules"
    model: sonnet
    tools: Read, Write, Edit, Bash, Glob, Grep
    memory: project
    maxTurns: 20
    routing_triggers:
      - "iOS config"
      - "Android config"
      - "native module"
      - "permissions"
      - "build settings"

parallel_groups:
  - [ui-builder, logic-handler]

demo_task:
  agent: ui-builder
  task: "Create a placeholder settings screen"
  additive: true
  estimated_seconds: 20
